<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Favorite Person 💕</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Soft Click Sound -->
  <audio id="softClick" src="soft-chime.mp3" preload="auto"></audio>

  <canvas id="particleCanvas"></canvas>

  <!-- SCREEN 1 -->
  <section id="screen-opening" class="screen active">
    <div class="screen-inner">
      <div class="opening-card glass-card">
        <div class="heart-icon pulse-heart">♥</div>
        <h1 class="title-main">For My<br /><em>Favorite Person</em></h1>
        <p class="subtitle">I made this just for you</p>
        <div class="divider-line"></div>
        <button class="cta-btn" onclick="playSoftClick(); startJourney();">
          💌 Open My Heart
        </button>
      </div>
    </div>
  </section>

  <!-- SCREEN 2 -->
  <section id="screen-cards" class="screen">
    <div class="screen-inner">
      <div id="progress-dots" class="progress-dots"></div>
      <div id="card-stage" class="card-stage"></div>

      <div class="card-nav">
        <button id="btn-next-card" class="nav-btn" onclick="playSoftClick(); nextCard();">
          Next →
        </button>
      </div>
    </div>
  </section>

  <!-- SCREEN 3 -->
  <section id="screen-reveal" class="screen">
    <div class="screen-inner">
      <div class="reveal-card glass-card premium">
        <div id="heart-burst"></div>
        <p class="reveal-prelude">I don't need a special day to tell you this...</p>
        <h2 class="reveal-main">I love you,</h2>
        <h2 class="reveal-name" id="partner-name">My Love</h2>
        <p class="reveal-sub">More than words could ever hold.</p>
      </div>

      <button class="nav-btn glow-btn" onclick="playSoftClick(); showFinal();">
        Continue →
      </button>
    </div>
  </section>

  <!-- SCREEN 4 -->
  <section id="screen-final" class="screen">
    <div class="screen-inner">
      <div class="final-card glass-card">
        <h2 class="final-title">Forever starts<br /><em>with you.</em></h2>
        <p class="final-sub">Thank you for being my everything.</p>

        <div class="final-buttons">
          <button class="cta-btn secondary" onclick="playSoftClick(); sayBack();">
            💬 Say it back
          </button>
          <button class="cta-btn ghost" onclick="playSoftClick(); playAgain();">
            🔁 Play again
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- MODAL -->
  <div id="say-back-modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
    <div class="modal-card glass-card">
      <h3>They said it back!</h3>
      <p>"I love you too."</p>
      <button class="cta-btn" onclick="playSoftClick(); closeSayBack();">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
